# mnq_bot pre-commit gate — mirrors eta_engine/.pre-commit-config.yaml.
#
# The "real-bug gate" hook MUST pass; the autofix hook is best-effort.
# v1_locked/ is excluded because it's a frozen reproducibility snapshot
# (see eta_v3_framework/v1_locked/LOCKED.txt).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-ast
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # Hard gate: real-bug rules MUST pass.  Style lints can drift; these cannot.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        name: ruff (real-bug gate, no autofix)
        args:
          - "--select=F821,F811,B006,B008,B904"
          - "--no-fix"
          - "--exclude=eta_v3_framework/v1_locked"
