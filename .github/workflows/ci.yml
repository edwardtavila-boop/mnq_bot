name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install ruff (no project install needed)
        run: uv tool install ruff
      - name: Lint
        run: uv tool run ruff check .

  pytest:
    name: pytest (full sweep)
    runs-on: ubuntu-latest
    needs: ruff
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync project deps
        run: uv sync --frozen
      - name: Run pytest
        run: uv run pytest -x -q --no-header
        env:
          PYTHONDONTWRITEBYTECODE: "1"
